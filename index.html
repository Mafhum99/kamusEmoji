<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamus Emoji Premium</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #ec4899;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .search-wrapper {
            position: sticky;
            top: 1rem;
            z-index: 100;
            margin-bottom: 2rem;
            backdrop-filter: blur(12px);
            background: var(--glass);
            padding: 1rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        #searchInput {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        .emoji-card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .emoji-card:hover {
            transform: translateY(-5px);
            background: #2d3748;
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .emoji-char {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .emoji-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.3rem;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .emoji-code {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: monospace;
        }

        .stats {
            text-align: center;
            margin-bottom: 1rem;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        @media (max-width: 640px) {
            .emoji-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 1rem;
            }
            .emoji-char { font-size: 2.5rem; }
            h1 { font-size: 1.8rem; }
        }

        .no-results {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
            font-size: 1.2rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Kamus Emoji Premium</h1>
            <p class="subtitle">Cari, Temukan, dan Salin Emoji Favorit Anda</p>
        </header>

        <div class="search-wrapper">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari emoji, nama, atau kode (misal: smile, U+1F600)..." autofocus>
            </div>
            <div class="filters" id="categoryFilters">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="face">Wajah</button>
                <button class="filter-btn" data-filter="hand">Tangan</button>
                <button class="filter-btn" data-filter="heart">Hati</button>
                <button class="filter-btn" data-filter="animal">Hewan</button>
                <button class="filter-btn" data-filter="food">Makanan</button>
                <button class="filter-btn" data-filter="travel">Travel</button>
                <button class="filter-btn" data-filter="object">Benda</button>
                <button class="filter-btn" data-filter="symbol">Simbol</button>
            </div>
        </div>

        <div class="stats" id="stats">Memuat emoji...</div>

        <div class="emoji-grid" id="emojiGrid">
            <!-- Emoji cards will be injected here -->
        </div>
    </div>

    <div id="toast" class="toast">Emoji berhasil disalin!</div>

    <script>
        // Data will be embedded here from emoji.json
        const emojiData = []; // To be filled

        const searchInput = document.getElementById('searchInput');
        const emojiGrid = document.getElementById('emojiGrid');
        const stats = document.getElementById('stats');
        const categoryFilters = document.getElementById('categoryFilters');
        const toast = document.getElementById('toast');

        let currentFilter = 'all';

        function init() {
            // Load the data from the embedded JSON
            fetchData();
        }

        async function fetchData() {
            try {
                // In a real environment, we'd embed the actual JSON object here.
                // For this tool execution, I will fetch it once or assume it's globally available.
                // Since I'm creating the file, I'll use a placeholder and then provide the full content.
                // WAIT: I will embed the ACTUAL data in the final write_file call.
                
                // For now, I'll use a local fetch if it's in the same dir, 
                // but user wants it "jadi 1", so I will embed it.
                renderEmojis(emojiData);
            } catch (e) {
                console.error(e);
                stats.innerText = "Gagal memuat data emoji.";
            }
        }

        function renderEmojis(data) {
            emojiGrid.innerHTML = '';
            
            const filtered = data.filter(item => {
                const query = searchInput.value.toLowerCase();
                const matchesSearch = item.name.toLowerCase().includes(query) || 
                                     item.code.toLowerCase().includes(query) ||
                                     (item.keywords && item.keywords.some(k => k.toLowerCase().includes(query))) ||
                                     item.emoji.includes(query);
                
                if (currentFilter === 'all') return matchesSearch;
                
                // Simple category matching logic
                const matchesCategory = item.name.toLowerCase().includes(currentFilter) || 
                                        (item.keywords && item.keywords.some(k => k.toLowerCase().includes(currentFilter)));
                
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                emojiGrid.innerHTML = '<div class="no-results">Tidak ada emoji yang ditemukan ☹️</div>';
                stats.innerText = `Menampilkan 0 emoji`;
                return;
            }

            // Slice for performance (lazy loading would be better, but 2k-3k is okay for modern browsers)
            const displayLimit = 500;
            const toDisplay = filtered.slice(0, displayLimit);

            toDisplay.forEach(item => {
                const card = document.createElement('div');
                card.className = 'emoji-card';
                card.innerHTML = `
                    <span class="emoji-char">${item.emoji}</span>
                    <div class="emoji-name">${item.name}</div>
                    <div class="emoji-code">${item.code}</div>
                `;
                card.onclick = () => copyToClipboard(item.emoji);
                emojiGrid.appendChild(card);
            });

            stats.innerText = `Menampilkan ${Math.min(filtered.length, displayLimit)} dari ${filtered.length} emoji`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        searchInput.addEventListener('input', () => {
            renderEmojis(emojiData);
        });

        categoryFilters.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-btn')) {
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderEmojis(emojiData);
            }
        });

        // Initialize when data is ready
        // (The actual data injection happens in the tool call)
    </script>
